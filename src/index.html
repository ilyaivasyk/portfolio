<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- Head copied from root index.html, unchanged except paths if needed -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/img/logo.svg" />
    <title>
      Illia Ivasyk — WordPress Systems Engineer • Front-End Developer • Amazon
      Author
    </title>
    <meta
      name="description"
      content="Portfolio of Illia Ivasyk - WordPress Systems Engineer, Front-End Developer, and Amazon Author specializing in custom themes, plugins, and CI/CD deployments."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cosmic: {
                50: "#f0f4ff",
                100: "#e0e8ff",
                200: "#c7d4ff",
                300: "#a0b8ff",
                400: "#7a94ff",
                500: "#5c6fff",
                600: "#4f4ff5",
                700: "#443de0",
                800: "#3a33bc",
                900: "#313296",
                950: "#1e1a4a",
              },
              nebula: {
                50: "#fdf4ff",
                100: "#fae8ff",
                200: "#f5d0fe",
                300: "#f0abfc",
                400: "#e879f9",
                500: "#d946ef",
                600: "#c026d3",
                700: "#a21caf",
                800: "#86198f",
                900: "#701a75",
                950: "#4a044e",
              },
              space: {
                900: "#0a0a0f",
                800: "#0f0f18",
                700: "#141420",
                600: "#1a1a2e",
                500: "#1e1e3f",
              },
              stellar: {
                cyan: "#00f5ff",
                purple: "#bf00ff",
                pink: "#ff00aa",
                blue: "#0066ff",
              },
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
              display: ["Orbitron", "sans-serif"],
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              "float-slow": "float 8s ease-in-out infinite",
              "glow-pulse": "glow-pulse 3s ease-in-out infinite",
              "slide-in": "slide-in 0.5s ease-out forwards",
              "fade-in": "fade-in 0.8s ease-out forwards",
              "star-twinkle": "star-twinkle 3s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-20px)" },
              },
              "glow-pulse": {
                "0%, 100%": { opacity: "0.4" },
                "50%": { opacity: "0.8" },
              },
              "slide-in": {
                "0%": { transform: "translateX(-100%)", opacity: "0" },
                "100%": { transform: "translateX(0)", opacity: "1" },
              },
              "fade-in": {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              "star-twinkle": {
                "0%, 100%": { opacity: "0.3", transform: "scale(1)" },
                "50%": { opacity: "1", transform: "scale(1.2)" },
              },
            },
            backgroundImage: {
              "gradient-radial": "radial-gradient(var(--tw-gradient-stops))",
              "gradient-conic":
                "conic-gradient(from 180deg at 50% 50%, var(--tw-gradient-stops))",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body class="bg-space-900 text-white font-sans antialiased overflow-x-hidden">
    <!-- Background Elements -->
    <div
      class="fixed inset-0 grid-bg pointer-events-none"
      aria-hidden="true"
    ></div>
    <div class="fixed inset-0 pointer-events-none" aria-hidden="true">
      <div
        class="absolute top-1/4 -left-32 w-96 h-96 bg-cosmic-600/20 rounded-full blur-[128px]"
      ></div>
      <div
        class="absolute top-1/2 -right-32 w-96 h-96 bg-nebula-600/20 rounded-full blur-[128px]"
      ></div>
      <div
        class="absolute bottom-1/4 left-1/3 w-64 h-64 bg-stellar-cyan/10 rounded-full blur-[100px]"
      ></div>
    </div>

    <!-- Stars -->
    <div
      class="fixed inset-0 pointer-events-none overflow-hidden"
      aria-hidden="true"
      id="stars-container"
    ></div>

    <!-- Skip Link for Accessibility -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-cosmic-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg"
      data-i18n="skip"
    >
      Skip to main content
    </a>

    <!-- Sticky Navbar -->
    <nav
      class="fixed top-0 left-0 right-0 z-50 glass-panel"
      role="navigation"
      aria-label="Main navigation"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <!-- Logo -->
          <a
            href="#"
            class="flex items-center gap-3 group"
            aria-label="Illia Ivasyk - Home"
          >
            <img
              src="/assets/img/logo.svg"
              alt="Illia Ivasyk Logo"
              class="w-10 h-10 group-hover:scale-110 transition-transform duration-300"
            />
          </a>

          <!-- Desktop Navigation -->
          <div class="hidden md:flex items-center gap-6">
            <a
              href="#hero"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navHome"
              >Home</a
            >
            <a
              href="#work"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navWork"
              >Work</a
            >
            <a
              href="#books"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navBooks"
              >Books</a
            >
            <a
              href="#services"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navServices"
              >Services</a
            >
            <a
              href="#stack"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navStack"
              >Stack</a
            >
            <a
              href="#contact"
              class="text-gray-300 hover:text-stellar-cyan transition-colors duration-300 font-medium focus-visible:text-stellar-cyan"
              data-i18n="navContact"
              >Contact</a
            >
            <!-- Language switcher -->
            <span class="flex items-center gap-1 text-gray-500">
              <button
                type="button"
                data-lang="en"
                class="lang-btn px-2 py-1 rounded text-sm font-medium text-gray-300 hover:text-stellar-cyan transition-colors"
                aria-pressed="true"
                aria-label="English"
              >
                EN
              </button>
              <span class="text-gray-600">|</span>
              <button
                type="button"
                data-lang="uk"
                class="lang-btn px-2 py-1 rounded text-sm font-medium text-gray-300 hover:text-stellar-cyan transition-colors"
                aria-pressed="false"
                aria-label="Українська"
              >
                UA
              </button>
            </span>
          </div>

          <!-- Mobile Menu Button -->
          <button
            type="button"
            class="md:hidden p-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            aria-expanded="false"
            aria-controls="mobile-menu"
            id="mobile-menu-btn"
          >
            <span class="sr-only" data-i18n="openMenu">Open main menu</span>

            <!-- Burger -->
            <svg
              class="icon-burger w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>

            <!-- Close (X) -->
            <svg
              class="icon-close w-6 h-6 hidden"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div
        class="md:hidden hidden opacity-0 -translate-y-2 pointer-events-none transition duration-200 ease-out"
        id="mobile-menu"
      >
        <div
          class="px-4 pt-2 pb-4 space-y-2 glass-panel border-t border-cosmic-500/20"
        >
          <a
            href="#hero"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navHome"
            >Home</a
          >
          <a
            href="#work"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navWork"
            >Work</a
          >
          <a
            href="#books"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navBooks"
            >Books</a
          >
          <a
            href="#services"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navServices"
            >Services</a
          >
          <a
            href="#stack"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navStack"
            >Stack</a
          >
          <a
            href="#contact"
            class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
            data-i18n="navContact"
            >Contact</a
          >
          <div
            class="flex items-center gap-2 pt-2 border-t border-cosmic-500/20"
          >
            <span
              class="px-4 py-2 text-xs font-mono text-gray-500 uppercase tracking-wider"
              >Lang</span
            >
            <button
              type="button"
              data-lang="en"
              class="lang-btn px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
              aria-label="English"
            >
              EN
            </button>
            <button
              type="button"
              data-lang="uk"
              class="lang-btn px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
              aria-label="Українська"
            >
              UA
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main id="main-content">
      <include src="./src/sections/hero.html"></include>
      <include src="./src/sections/projects.html"></include>
      <div class="section-divider max-w-4xl mx-auto"></div>
      <include src="./src/sections/about.html"></include>
      <div class="section-divider max-w-4xl mx-auto"></div>
      <include src="./src/sections/services.html"></include>
      <div class="section-divider max-w-4xl mx-auto"></div>

      <!-- Tech Stack Section (kept inline for now) -->
      <include src="./src/sections/stack.html"></include>

      <div class="section-divider max-w-4xl mx-auto"></div>

      <!-- Engineering Philosophy Section (kept inline) -->
      <include src="./src/sections/philosophy.html"></include>

      <div class="section-divider max-w-4xl mx-auto"></div>

      <include src="./src/sections/testimonials.html"></include>
      <include src="./src/sections/faq.html"></include>
      <include src="./src/sections/contact.html"></include>
      <include src="./src/sections/footer.html"></include>
    </main>

    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
